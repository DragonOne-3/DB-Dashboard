name: Daily Mailing Service (필터링 버전)
on:
  schedule:
    # KST 월~금 08:30 = UTC 일~목 23:30
    - cron: '30 23 * * 0-4'
  workflow_dispatch:  # 수동 테스트용

jobs:
  send-report-b:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests google-api-python-client \
                      google-auth-httplib2 google-auth-oauthlib

      # 데이터 로드 & HTML 생성
      # 주말 감지 시 exit(0) → 이후 스텝 실행되지 않음 (outcome: success지만 report_b_path 없음)
      # 데이터 없음 시 exit(1) → 이후 메일 스텝 자동 스킵
      - name: Generate filtered report
        id: run_b
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          GOOGLE_AUTH_JSON:   ${{ secrets.GOOGLE_AUTH_JSON }}
        run: python daily_mailing_service.py

      # run_b 성공 + report_b_path 존재할 때만 메일 발송
      - name: Send Filtered Email
        if: steps.run_b.outcome == 'success' && steps.run_b.outputs.report_b_path != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port:    465
          username:       ${{ secrets.EMAIL_USER }}
          password:       ${{ secrets.EMAIL_PASS }}
          subject:        "[조달 리포트] ${{ steps.run_b.outputs.collect_period }} 수집 결과"
          to:             수신자B그룹
          bcc: >-
            mhy9680@innodep.com,
            
          # 발신자 주소는 secrets로 숨김 처리 — 수신자에게 이름만 표시됨
          from:           '"조달데이터봇" <${{ secrets.EMAIL_USER }}>'
          html_body:      file://${{ steps.run_b.outputs.report_b_path }}
