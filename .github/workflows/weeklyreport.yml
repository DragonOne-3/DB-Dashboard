name: Weekly Sales Report

on:
  schedule:
    # 매주 월요일 한국 시간 오전 07:11 (UTC 일요일 22:11)
    - cron: '11 22 * * 0'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 필요한 모든 라이브러리를 한 번에 설치합니다.
          pip install pandas requests google-api-python-client google-auth-httplib2 google-auth-oauthlib pytimekr gspread oauth2client

      - name: Run Weekly Report
        id: run_report
        env:
          GOOGLE_AUTH_JSON: ${{ secrets.GOOGLE_AUTH_JSON }}
        run: python weeklyreport.py

      - name: Send Email Notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          # 제목에 날짜 범위 포함
          subject: "📊 [주간리포트] 특정품목 납품 업체별 매출 순위 (${{ steps.run_report.outputs.report_range }})"
          to: mhy9680@innodep.com, jinseok8809@innodep.com, seungju@innodep.com, mhy9680@naver.com, jbgg@innodep.com, sg.lee@innodep.com
          from: GitHub Actions Bot
          # HTML 파일 본문 사용
          html_body: file://report.html
